<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <!-- Background -->
  <rect width="1500" height="500" fill="#ffffff"/>
  
  <!-- The Forge: Two overlapping squares (centered) -->
  <g transform="translate(600, 190)">
    <rect x="0" y="0" width="56" height="56" fill="none" stroke="#1a1a1a" stroke-width="5"/>
    <rect x="32" y="32" width="56" height="56" fill="none" stroke="#1a1a1a" stroke-width="5"/>
    
    <!-- Wordmark -->
    <text x="120" y="72" fill="#1a1a1a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="500" letter-spacing="-0.01em">Foundry Labs</text>
  </g>
</svg>
